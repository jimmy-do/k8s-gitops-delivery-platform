apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "core-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core-api.labels" . | nindent 4 }}
spec:
  # replicas is omitted when HPA is enabled — HPA owns the replica count.
  # Setting replicas here AND enabling HPA causes a fight: every Helm upgrade
  # would reset replicas to this value, overriding what HPA decided.
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "core-api.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable: 0 — never take a pod down before the replacement is ready.
      # Combined with readiness probes this guarantees zero-downtime deploys.
      maxUnavailable: 0
      # maxSurge: 1 — spin up one extra pod during the rollout.
      # At minReplicas=2: during rollout you briefly have 3 pods, then back to 2.
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "core-api.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when ConfigMap content changes.
        # Without this, Helm upgrades that only change env values won't restart pods.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "core-api.serviceAccountName" . }}

      # Do NOT auto-mount the service account token unless the app explicitly
      # needs to call the Kubernetes API. Reduces attack surface.
      automountServiceAccountToken: false

      # Pod-level security — applies to all containers in the pod
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      # Graceful shutdown: give the app 30s to finish in-flight requests before SIGKILL.
      # Must be > Gunicorn --timeout (30s) + a small buffer.
      # K8s sends SIGTERM, waits terminationGracePeriodSeconds, then sends SIGKILL.
      terminationGracePeriodSeconds: 45

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # Container-level security — more granular than pod-level
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          ports:
            - name: http
              containerPort: 5000
              protocol: TCP

          # Environment variables — non-sensitive only.
          # Secrets are mounted via External Secrets Operator (see ESO ExternalSecret).
          env:
            - name: APP_ENV
              value: {{ .Values.env.APP_ENV | quote }}
            - name: APP_VERSION
              value: {{ .Values.env.APP_VERSION | quote }}
            # Downward API: expose pod name and namespace to the app for logging.
            # Useful for correlating Loki logs with Kubernetes pod events.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

          # =================================================================
          # Probes — three separate probes for three separate concerns.
          # =================================================================

          # Startup probe: blocks liveness + readiness until the app is up.
          # Without this, a slow-starting app gets killed by liveness before
          # it has a chance to boot. failureThreshold × periodSeconds = max startup window.
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}

          # Liveness probe: "is the container alive?"
          # Failure → restart. Use for deadlocks and hung processes.
          # NOT for dependency failures — that's readiness.
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}

          # Readiness probe: "is the container ready to serve traffic?"
          # Failure → pod removed from Service endpoints. No restart.
          # DB down → readiness fails → pod pulled from LB → no user-visible error.
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

          # Resource requests and limits are required on every container.
          # Scheduler uses requests for placement. Limits are hard ceilings.
          # CPU over limit → throttled. Memory over limit → OOMKill (exit 137).
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # Temporary dir writable by the app (for gunicorn worker files etc.)
          # readOnlyRootFilesystem: true in securityContext requires this for any writes.
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
