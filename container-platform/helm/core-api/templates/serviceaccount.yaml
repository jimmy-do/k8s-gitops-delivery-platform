{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "core-api.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "core-api.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Do not auto-mount the service account token.
# The app does not call the Kubernetes API, so mounting the token
# is unnecessary attack surface — if the pod is compromised, an attacker
# could use the token to query the cluster API.
# AWS access is handled by IRSA (projected service account token), not this token.
automountServiceAccountToken: false
{{- end }}
