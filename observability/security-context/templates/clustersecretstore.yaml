# ClusterSecretStore is the cluster-scoped configuration that tells ESO HOW to authenticate to
# AWS and WHERE to look for secrets. ExternalSecret resources (in any namespace) reference it
# by name to actually pull values.
#
# WHY ClusterSecretStore (cluster-scoped) and not SecretStore (namespace-scoped):
#   - One AWS Secrets Manager backend serves the whole cluster (Alertmanager webhooks today,
#     potentially RDS password sync for app pods later).
#   - SecretStore requires one copy per namespace — extra YAML for no isolation benefit at this
#     scale. When multiple consumer namespaces appear that should NOT see each other's secrets,
#     SecretStore-per-ns becomes valuable. Until then, ClusterSecretStore is right.
#   - Blast radius IS limited — by the IAM role's resource ARNs in Phase 2, not by the SecretStore
#     boundary. Authz is enforced at AWS STS / IAM, not at the K8s CR level.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    # ArgoCD sync wave: apply AFTER the CRD is registered and ESO controller is healthy.
    # Wave 0 (no annotation) = the subchart (CRDs + Deployments). Wave 1 = this CR.
    # Without this, ArgoCD races: applies the CR before the CRD's API endpoint exists →
    # "no matches for kind ClusterSecretStore" until the next sync cycle.
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    aws:
      service: SecretsManager
      # Region MUST match where Phase 2 created the secrets. Hardcoded for single-cluster portfolio.
      # Multi-region production would template this via ApplicationSet per-env value overlay.
      region: us-west-2
      auth:
        # JWT auth uses the projected SA token from the referenced ServiceAccount. The SA's IRSA
        # annotation tells AWS which IAM role to assume; STS validates the token against the EKS
        # OIDC provider trust policy. No static credentials anywhere in cluster.
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets-system