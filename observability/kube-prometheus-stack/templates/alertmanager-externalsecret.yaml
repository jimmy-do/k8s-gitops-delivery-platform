# ExternalSecret syncs the Slack + PagerDuty webhook values from AWS Secrets Manager into a
# native K8s Secret named "alertmanager-webhooks". The kps chart's alertmanagerSpec.secrets[]
# mounts this Secret at /etc/alertmanager/secrets/alertmanager-webhooks/<key> inside the AM pod.
#
# Naming MUST match three places exactly:
#   1. target.name here ............................. -> "alertmanager-webhooks"
#   2. alertmanagerSpec.secrets[] in values.yaml ....-> "alertmanager-webhooks"
#   3. file paths in AM config (api_url_file etc.) .-> /etc/alertmanager/secrets/alertmanager-webhooks/<key>
# Drift between any of these = silent breakage. Webhook URLs fail to load, alerts never fire,
# nobody notices until the next outage.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-webhooks
  annotations:
    # Wave 1: apply AFTER bootstrap/external-secrets/ has installed CRDs and ClusterSecretStore.
    # The kps subchart (wave 0) creates the namespace; this CR populates the Secret AM mounts.
    argocd.argoproj.io/sync-wave: "1"
spec:
  # 1h is the default refresh. Tighten to 5m for incident-critical secrets (PagerDuty) once an
  # SRE on-call cycle exposes a rotation pain point. For portfolio: leave at default.
  refreshInterval: 1h

  # Reference the cluster-scoped store created in bootstrap/external-secrets/.
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    # The K8s Secret this ExternalSecret creates. Owner = ESO deletes the Secret when this CR
    # is deleted. Alternative is Merge (leaves the Secret if ESO is removed) — Owner is correct
    # for GitOps: deleting the source manifest deletes the downstream resource.
    name: alertmanager-webhooks
    creationPolicy: Owner

  data:
    # Each entry maps an AWS Secrets Manager secret to a key inside the K8s Secret.
    # secretKey = the key inside the resulting K8s Secret (also the filename when mounted).
    # remoteRef.key = the secret name in AWS Secrets Manager (set by Phase 2 Terraform).
    - secretKey: slack-webhook-url
      remoteRef:
        key: /production-eks/alertmanager/slack-webhook

    - secretKey: pagerduty-routing-key
      remoteRef:
        key: /production-eks/alertmanager/pagerduty-routing-key