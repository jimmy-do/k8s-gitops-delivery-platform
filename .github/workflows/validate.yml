name: Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "dev/**"
      - "feature/**"

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform (${{ matrix.root }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        root:
          - infrastructure-cicd/terraform/envs/local
          - infrastructure-cicd/terraform/envs/aws
          - infrastructure-cicd/terraform/bootstrap
    defaults:
      run:
        working-directory: ${{ matrix.root }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.x

      - name: Terraform fmt
        working-directory: infrastructure-cicd/terraform
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate -no-color

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint default chart
        run: helm lint container-platform/helm/core-api

      - name: Helm lint local overlay
        run: |
          helm lint container-platform/helm/core-api \
            --values container-platform/helm/core-api/values.yaml \
            --values container-platform/helm/core-api/values-local.yaml

      - name: Helm template local overlay
        run: |
          helm template core-api container-platform/helm/core-api \
            --namespace demo \
            --values container-platform/helm/core-api/values.yaml \
            --values container-platform/helm/core-api/values-local.yaml \
            > /tmp/core-api-local.yaml
          test -s /tmp/core-api-local.yaml

  yaml:
    name: YAML manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yamllint
        run: python -m pip install --user yamllint

      - name: Lint ArgoCD app manifests
        run: |
          yamllint \
            -d "{extends: default, rules: {document-start: disable, line-length: disable}}" \
            infrastructure-cicd/argocd-apps

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build core-api image
        uses: docker/build-push-action@v6
        with:
          context: container-platform
          file: container-platform/Dockerfile
          push: false
          tags: core-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
